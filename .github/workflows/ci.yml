name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Unit Tests
        run: cargo test -p aegis-cli -p aegis-common -p aegis-cni -p xtask
      - name: Clippy
        run: cargo clippy -p aegis-cli -p aegis-common -p aegis-cni -p xtask -- -D warnings
      - name: Format Check
        run: cargo fmt --all -- --check
