syntax = "proto3";

package aegis.fleet;

// Core gRPC service for controlling Aegis nodes (agents) centrally
service FleetControl {
  // Agent connects to the Tower and subscribes to blocklist updates.
  // The stream pushes new IP blocks generated by other agents or central intel.
  rpc SubscribeBlocklist (NodeInfo) returns (stream BlockRule);

  // Agent reports a security event (e.g., DPI trigger, JA3 match) to Tower.
  // The Tower decides whether to broadcast this to the rest of the fleet.
  rpc ReportEvent (EventMsg) returns (Ack);
}

message NodeInfo {
  string node_id = 1;
  string hostname = 2;
  string version = 3;
}

message BlockRule {
  string ip = 1;
  uint32 duration_secs = 2;  // 0 = permanent
  string reason = 3;
  string source_node = 4;
}

enum EventSeverity {
  INFO = 0;
  WARNING = 1;
  CRITICAL = 2;
}

message EventMsg {
  string node_id = 1;
  string event_type = 2;  // "DPI", "JA3", "PORTSCAN"
  string src_ip = 3;
  string dst_ip = 4;
  string message = 5;
  EventSeverity severity = 6;
}

message Ack {
  bool success = 1;
}
